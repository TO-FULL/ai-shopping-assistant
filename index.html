<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI电商购物助手</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"/>
                    <circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                <span>AI电商购物助手</span>
            </div>
            <p class="subtitle">智能理解需求，精准推荐好物</p>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section" id="inputSection">
                <div class="input-card">
                    <label for="userInput" class="input-label">请描述您的购物需求</label>
                    <textarea
                        id="userInput"
                        class="user-input"
                        placeholder="例如：我想买一条高腰微喇牛仔裤，黑色，春秋款，价格在100-200元之间，显瘦百搭..."
                        rows="4"
                    ></textarea>
                    <div class="input-actions">
                        <button class="btn-clear" id="btnClear">清空</button>
                        <button class="btn-search" id="btnSearch">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                            智能搜索
                        </button>
                    </div>
                    <div class="quick-tags">
                        <span class="tags-label">试试这些：</span>
                        <button class="tag" data-query="夏季透气运动鞋，白色，适合跑步，价格在300元以内">夏季透气运动鞋</button>
                        <button class="tag" data-query="保湿面霜，适合敏感肌，200元左右，口碑好">保湿面霜</button>
                        <button class="tag" data-query="商务休闲衬衫，浅蓝色，修身款，适合上班穿">商务衬衫</button>
                        <button class="tag" data-query="蓝牙耳机，降噪，续航长，500元以内">蓝牙耳机</button>
                    </div>
                </div>
            </section>

            <!-- Loading Section -->
            <section class="loading-section hidden" id="loadingSection">
                <div class="loading-animation">
                    <div class="ai-brain">
                        <div class="pulse-ring"></div>
                        <div class="pulse-ring"></div>
                        <div class="pulse-ring"></div>
                        <svg class="brain-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/>
                            <path d="M9 21h6"/>
                        </svg>
                    </div>
                    <p class="loading-text">AI 正在分析您的需求...</p>
                    <div class="loading-steps" id="loadingSteps">
                        <div class="step" data-step="1">解析商品类型</div>
                        <div class="step" data-step="2">提取筛选条件</div>
                        <div class="step" data-step="3">匹配优质商品</div>
                        <div class="step" data-step="4">生成推荐理由</div>
                    </div>
                </div>
            </section>

            <!-- Results Section -->
            <section class="results-section hidden" id="resultsSection">
                <!-- Filter Summary -->
                <div class="filter-summary" id="filterSummary">
                    <div class="filter-header">
                        <h2 class="filter-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                <polyline points="22 4 12 14.01 9 11.01"/>
                            </svg>
                            AI 解析结果
                        </h2>
                        <button class="btn-edit" id="btnEdit">调整条件</button>
                    </div>
                    <div class="filter-tags" id="filterTags"></div>
                </div>

                <!-- Sort and Filter Bar -->
                <div class="toolbar">
                    <div class="result-count" id="resultCount">找到 0 件商品</div>
                    <div class="sort-options">
                        <button class="sort-btn active" data-sort="relevance">相关度</button>
                        <button class="sort-btn" data-sort="price-asc">价格 ↑</button>
                        <button class="sort-btn" data-sort="price-desc">价格 ↓</button>
                        <button class="sort-btn" data-sort="sales">销量</button>
                    </div>
                </div>

                <!-- Product Grid -->
                <div class="product-grid" id="productGrid"></div>

                <!-- Load More -->
                <div class="load-more-container hidden" id="loadMoreContainer">
                    <button class="btn-load-more" id="btnLoadMore">加载更多商品</button>
                </div>

                <!-- Empty State -->
                <div class="empty-state hidden" id="emptyState">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                        <path d="M8 8l6 6"/>
                        <path d="M14 8l-6 6"/>
                    </svg>
                    <h3>未找到符合条件的商品</h3>
                    <p>建议您放宽筛选条件或尝试其他描述</p>
                    <button class="btn-retry" id="btnRetry">重新搜索</button>
                </div>
            </section>

            <!-- Product Detail Full Page -->
            <section class="detail-section hidden" id="detailSection">
                <div class="detail-header">
                    <button class="btn-back" id="btnBack">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5"/>
                            <path d="M12 19l-7-7 7-7"/>
                        </svg>
                        <span>返回商品列表</span>
                    </button>
                </div>
                <div class="detail-body" id="detailBody"></div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>AI 电商购物助手 · 让购物更智能</p>
        </footer>
    </div>

    <!-- Product Detail Modal -->
    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6 6 18"/>
                    <path d="m6 6 12 12"/>
                </svg>
            </button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="js/mockData.js"></script>
    <script src="js/aiParser.js"></script>
    <script src="js/apiService.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
